<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Wisemonk Recruit — Portal</title>
  <meta http-equiv="refresh" content="0; url=recruit-pipeline.html">
  <link rel="canonical" href="recruit-pipeline.html">
  <style>
    body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; margin: 0; min-height: 100vh; display: flex; align-items: center; justify-content: center; background: #FAFBFF; color: #1A2030; }
    .loader { text-align: center; }
    .loader .dot { width: 10px; height: 10px; background: #0026FF; border-radius: 50%; display: inline-block; margin: 0 3px; animation: bounce 0.6s infinite alternate; }
    .loader .dot:nth-child(2) { animation-delay: 0.15s; }
    .loader .dot:nth-child(3) { animation-delay: 0.3s; }
    @keyframes bounce { to { transform: translateY(-8px); } }
    p { margin-top: 18px; font-size: 14px; color: #6B7280; }
    a { color: #0026FF; text-decoration: none; font-weight: 600; }
  </style>
</head>
<body>
  <div class="loader">
    <span class="dot"></span><span class="dot"></span><span class="dot"></span>
    <p>Loading Wisemonk Recruit… <a href="recruit-pipeline.html">Open portal →</a></p>
  </div>
</body>
</html>
