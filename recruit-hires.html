<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>How many people are you hiring? — Wisemonk Recruitment</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Geist:wght@300;400;500;600;700;800&family=Geist+Mono:wght@400;500;600&display=swap" rel="stylesheet">
  <style>
    :root {
      --primary-50: #EEF1FF;
      --primary-100: #D6DCFF;
      --primary-500: #0026FF;
      --primary-600: #001FCC;
      --neutral-0: #FFFFFF;
      --neutral-50: #F7F8FA;
      --neutral-100: #EEF0F4;
      --neutral-200: #DDE1E9;
      --neutral-300: #C4CAD6;
      --neutral-400: #9AA2B2;
      --neutral-500: #6B7588;
      --neutral-700: #363D4D;
      --border: #EEF0F4;
      --border-strong: #DDE1E9;
      --text-primary: #222733;
      --text-secondary: #363D4D;
      --text-muted: #9AA2B2;
      --radius-md: 12px;
      --radius-lg: 16px;
      --radius-full: 100px;
    }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: 'GT Standard', 'Geist', sans-serif; background: var(--neutral-0); color: var(--text-primary); min-height: 100vh; display: flex; flex-direction: column; }
    h1, h2, h3, h4, h5, h6 { font-family: 'GT Standard', 'Geist', sans-serif; }
    a { text-decoration: none; color: inherit; }
    button { font-family: inherit; border-radius: var(--radius-sm); }

    .topbar { display: flex; align-items: center; justify-content: space-between; padding: 22px 40px 18px; }
    .nav-logo { display: flex; align-items: center; gap: 10px; height: 36px; overflow: hidden; }
    .nav-logo img { height: 46px; margin-top: -10px; display: block; }
    .login-link {
      font-size: 14px; font-weight: 600; color: var(--text-secondary);
      padding: 10px 18px; border-radius: var(--radius-full);
      border: 1.5px solid var(--border-strong); background: var(--neutral-0);
      transition: all 0.15s;
    }
    .login-link:hover { border-color: var(--text-secondary); color: var(--text-primary); background: var(--neutral-50); }

    main { flex: 1; padding: 32px 24px 80px; }
    .wrapper { max-width: 560px; margin: 0 auto; }

    .progress { display: flex; align-items: center; justify-content: center; gap: 8px; margin-bottom: 36px; }
    .dot { height: 6px; border-radius: 4px; background: var(--neutral-200); transition: all 0.3s; width: 32px; }
    .dot.active { background: var(--primary-500); width: 48px; }
    .dot.done { background: var(--primary-500); }
    .progress-label {
      font-family: 'Geist Mono', monospace; font-weight: 500;
      font-size: 12px; letter-spacing: 0.5px; text-transform: uppercase;
      color: var(--text-muted); margin-left: 12px;
    }

    .back-link {
      display: inline-flex; align-items: center; gap: 6px;
      padding: 8px 14px 8px 10px;
      border-radius: var(--radius-full);
      font-size: 14px; font-weight: 600; color: var(--text-primary);
      margin-bottom: 12px;
      transition: background 0.15s;
      background: none;
      border: none;
      font-family: inherit;
      cursor: pointer;
      text-decoration: none;
    }
    .back-link:hover { color: var(--primary-600); background: var(--neutral-100); }
    .back-link svg { width: 16px; height: 16px; }

    .question-block { text-align: center; margin-bottom: 32px; }
    h1 { font-size: 30px; font-weight: 700; letter-spacing: -0.4px; line-height: 1.25; margin-bottom: 12px; }
    .subhead { font-size: 15px; color: var(--text-muted); line-height: 1.55; }
    .subhead strong { color: var(--text-secondary); font-weight: 600; }

    .options {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
      margin-bottom: 28px;
    }
    .option {
      position: relative;
      padding: 22px 18px;
      background: var(--neutral-0);
      border: 1.5px solid var(--border-strong);
      border-radius: var(--radius-md);
      cursor: pointer;
      text-align: left;
      transition: all 0.15s;
      display: flex; flex-direction: column; gap: 6px;
    }
    .option:hover { border-color: var(--neutral-400); background: var(--neutral-50); }
    .option .icon {
      width: 40px; height: 40px;
      border-radius: 10px;
      background: var(--primary-50);
      display: flex; align-items: center; justify-content: center;
      margin-bottom: 8px;
      transition: all 0.15s;
    }
    .option .icon svg { width: 22px; height: 22px; color: var(--primary-500); }
    .option .label { font-size: 17px; font-weight: 700; color: var(--text-primary); }
    .option .desc { font-size: 13.5px; color: var(--text-muted); line-height: 1.45; }
    .option .check-mark {
      position: absolute;
      top: 14px; right: 14px;
      width: 22px; height: 22px;
      border-radius: 50%;
      border: 1.5px solid var(--border-strong);
      display: flex; align-items: center; justify-content: center;
      background: var(--neutral-0);
      transition: all 0.15s;
    }
    .option .check-mark svg { width: 12px; height: 12px; color: #fff; opacity: 0; transition: opacity 0.15s; }

    .option.selected {
      border-color: var(--primary-500);
      background: var(--primary-50);
      box-shadow: 0 0 0 3px rgba(0,38,255,0.08);
    }
    .option.selected .check-mark { background: var(--primary-500); border-color: var(--primary-500); }
    .option.selected .check-mark svg { opacity: 1; }
    .option.selected .icon { background: var(--neutral-0); }

    .cta-button {
      width: 100%; padding: 16px 24px; border: none;
      border-radius: var(--radius-full);
      background: var(--primary-500); color: #fff;
      font-family: inherit; font-size: 16px; font-weight: 700;
      cursor: pointer; transition: all 0.15s ease;
      display: inline-flex; align-items: center; justify-content: center; gap: 10px;
      box-shadow: 0 6px 16px -6px rgba(0,38,255,0.45);
    }
    .cta-button:hover:not(:disabled) { background: var(--primary-600); transform: translateY(-1px); box-shadow: 0 8px 20px -6px rgba(0,38,255,0.55); }
    .cta-button:disabled { background: var(--neutral-200); color: var(--text-muted); cursor: not-allowed; transform: none; box-shadow: none; }
    .cta-button svg { width: 18px; height: 18px; }

    @media (max-width: 720px) {
      .topbar { padding: 16px 18px; }
      main { padding: 20px 18px 56px; }
      h1 { font-size: 24px; }
      .options { grid-template-columns: 1fr; }
    }
  </style>
  <link rel="stylesheet" href="mobile-fixes.css">
  <script src="mobile-fixes.js" defer></script>
</head>
<body>

  <header class="topbar">
    <a href="#" class="nav-logo">
      <img src="wisemonk_logo_final.png" alt="Wisemonk">
    </a>
    <a href="login.html" class="login-link">Log out</a>
  </header>

  <main>
    <div class="wrapper">

      <div class="progress" aria-label="Step 3 of 4">
        <div class="dot done"></div>
        <div class="dot done"></div>
        <div class="dot active"></div>
        <div class="dot"></div>
        <span class="progress-label">Step 3 of 4</span>
      </div>

      <button type="button" class="back-link" id="backBtn">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M19 12H5M12 19l-7-7 7-7"/></svg>
        Back
      </button>

      <div class="question-block">
        <h1>How many people are you hiring?</h1>
        <p class="subhead">A rough estimate is fine — it just helps us tailor your dashboard.</p>
      </div>

      <div class="options" id="options">
        <button class="option" data-value="1" type="button">
          <div class="icon">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M16 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="10" cy="7" r="4"/></svg>
          </div>
          <div class="label">Just 1 role</div>
          <div class="desc">My first India hire.</div>
          <div class="check-mark"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"/></svg></div>
        </button>

        <button class="option" data-value="2-5" type="button">
          <div class="icon">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M16 21v-2a4 4 0 0 0-4-4H6a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M22 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/></svg>
          </div>
          <div class="label">2–5 roles</div>
          <div class="desc">Building a small team.</div>
          <div class="check-mark"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"/></svg></div>
        </button>

        <button class="option" data-value="6-10" type="button">
          <div class="icon">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><circle cx="17" cy="7" r="4"/><path d="M23 21v-2a4 4 0 0 0-3-3.87"/></svg>
          </div>
          <div class="label">6–10 roles</div>
          <div class="desc">Scaling up a department.</div>
          <div class="check-mark"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"/></svg></div>
        </button>

        <button class="option" data-value="10+" type="button">
          <div class="icon">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M18 21v-2a4 4 0 0 0-4-4H6a4 4 0 0 0-4 4v2"/><path d="M22 21v-2a4 4 0 0 0-3-3.87"/><circle cx="10" cy="7" r="4"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/><path d="M19 11h2M20 10v2"/></svg>
          </div>
          <div class="label">10+ roles</div>
          <div class="desc">Setting up a full India office.</div>
          <div class="check-mark"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"/></svg></div>
        </button>
      </div>

      <button class="cta-button" id="continueBtn">
        Continue
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><path d="M5 12h14M13 5l7 7-7 7"/></svg>
      </button>
    </div>
  </main>

  <script>
    const params = new URLSearchParams(location.search);
    const country = params.get('country') || 'US';
    const options = document.querySelectorAll('.option');
    const continueBtn = document.getElementById('continueBtn');
    let selectedValue = null;

    options.forEach(opt => {
      opt.addEventListener('click', () => {
        options.forEach(o => o.classList.remove('selected'));
        opt.classList.add('selected');
        selectedValue = opt.dataset.value;
      });
    });

    continueBtn.addEventListener('click', () => {
      location.href = `recruit-timeline.html?country=${country}&hires=${encodeURIComponent(selectedValue || '')}`;
    });

    document.getElementById('backBtn').addEventListener('click', () => {
      if (history.length > 1) { history.back(); }
      else { location.href = 'recruit-country.html'; }
    });
  </script>

</body>
</html>
