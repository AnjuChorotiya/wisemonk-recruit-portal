<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Inbox — Wisemonk Recruitment</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Geist:wght@300;400;500;600;700;800&family=Geist+Mono:wght@400;500;600&display=swap" rel="stylesheet">
  <style>
    :root {
      --primary-50: #EEF1FF; --primary-100: #D6DCFF; --primary-500: #0026FF; --primary-600: #001FCC;
      --neutral-0: #FFFFFF; --neutral-50: #F7F8FA; --neutral-100: #EEF0F4; --neutral-200: #DDE1E9; --neutral-300: #C4CAD6; --neutral-400: #9AA2B2; --neutral-500: #6B7588; --neutral-700: #363D4D; --neutral-800: #222733;
      --ai-grad: linear-gradient(135deg, #7C5CFF, #2684FF);
      --success-50: #E6F9F0; --success-500: #12B76A; --success-700: #027A48;
      --warning-50: #FFFAEB; --warning-500: #F79009; --warning-700: #B54708;
      --danger-50: #FFF1F0; --danger-500: #F04438; --danger-700: #B42318;
      --border: #EEF0F4; --border-strong: #DDE1E9;
      --text-primary: #222733; --text-secondary: #363D4D; --text-muted: #9AA2B2;
      --radius-sm: 6px; --radius-md: 12px; --radius-lg: 16px; --radius-full: 100px;
      --sidebar-w: 280px; --header-h: 60px;
    }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: 'GT Standard', 'Geist', sans-serif; background: #fff; color: var(--text-primary); min-height: 100vh; }
    h1, h2, h3, h4, h5, h6 { font-family: 'GT Standard', 'Geist', sans-serif; }
    a { text-decoration: none; color: inherit; }
    button { font-family: inherit; border-radius: var(--radius-sm); }

    .app { display: grid; grid-template-columns: var(--sidebar-w) 1fr; grid-template-areas: "sidebar main"; min-height: 100vh; }

    /* Sidebar */
    .sidebar { grid-area: sidebar; background: #FFFFFF; padding: 12px 12px 16px; display: flex; flex-direction: column; position: sticky; top: 0; height: 100vh; }
    .brand-logo { display: block; padding: 6px 8px; margin-bottom: 24px; cursor: pointer; }
    .brand-logo { padding: 8px 8px !important; margin-bottom: 32px !important; }
    .brand-logo img { height: 52px; display: block; clip-path: inset(19px 0 5px 10px); margin-top: -19px; margin-bottom: -5px; margin-left: -10px; mix-blend-mode: multiply; }
    .ws-logo { width: 28px; height: 28px; border-radius: 7px; background: var(--ai-grad); display: flex; align-items: center; justify-content: center; font-size: 13px; font-weight: 700; color: #fff; flex-shrink: 0; }
    .ws-body { flex: 1; min-width: 0; }
    .ws-name { font-size: 13.5px; font-weight: 700; line-height: 1.2; }
    .ws-sub { font-size: 11.5px; color: var(--text-muted); margin-top: 1px; }
    .ws-switch .chev svg { width: 14px; height: 14px; color: var(--text-muted); }

    .sidebar-search { display: flex; align-items: center; gap: 8px; padding: 7px 10px; background: var(--neutral-50); border: 1px solid var(--border); border-radius: var(--radius-sm); margin: 4px 0 14px; cursor: pointer; transition: all 0.15s; }
    .sidebar-search:hover { background: var(--neutral-100); }
    .sidebar-search svg { width: 14px; height: 14px; color: var(--text-muted); }
    .sidebar-search span { flex: 1; font-size: 12.5px; color: var(--text-muted); }
    .sidebar-search kbd { padding: 1px 5px; background: var(--neutral-0); border: 1px solid var(--border-strong); border-radius: 4px; font-family: 'Geist Mono', monospace; font-weight: 500; font-size: 10px; color: var(--text-muted); }

    .nav-section { display: flex; flex-direction: column; gap: 4px; }
    .nav-section + .nav-section { margin-top: 16px; }
    .nav-section-label { font-family: 'Geist Mono', monospace; font-weight: 500; font-size: 11px; letter-spacing: 0.6px; text-transform: uppercase; color: var(--neutral-500); padding: 0 10px; margin-bottom: 4px; }
    .nav-item { display: flex; align-items: center; gap: 12px; padding: 10px 16px; border-radius: 8px; font-size: 16px; font-weight: 500; color: var(--text-secondary); cursor: pointer; transition: all 0.12s; letter-spacing: -0.1px; }
    .nav-item:hover { background: var(--neutral-50); color: var(--text-secondary); }
    .nav-item.active { background: #EEF1FF; color: var(--text-primary); font-weight: 600; box-shadow: 0 1px 2px rgba(34, 39, 51, 0.06); }
    .nav-item svg { width: 17px; height: 17px; flex-shrink: 0; color: var(--text-secondary); stroke-width: 1.7; }
    .nav-item.active svg { color: var(--text-primary); }
    .nav-item .label { flex: 1; }
    .nav-item .badge { padding: 1px 7px; background: transparent; color: var(--text-secondary); border-radius: var(--radius-full); font-size: 10.5px; font-weight: 600; }
    .nav-item.active .badge { background: var(--text-primary); color: #fff; }
    .nav-item .value { font-size: 12.5px; color: var(--text-secondary); font-family: 'Geist Mono', monospace; font-weight: 500; }
    .ws-switch { background: var(--neutral-0); border-radius: 12px; padding: 4px; margin-bottom: 12px; box-shadow: 0 1px 2px rgba(34, 39, 51, 0.05); }
    .ws-switch-row { display: flex; align-items: center; gap: 10px; padding: 8px 10px; border-radius: 8px; cursor: pointer; transition: background 0.12s; }
    .ws-switch-row:hover { background: var(--neutral-50); }
    .ws-switch-av { width: 32px; height: 32px; border-radius: 50%; background: #FF6B35; color: #fff; display: flex; align-items: center; justify-content: center; font-size: 13px; font-weight: 700; flex-shrink: 0; }
    .ws-switch-body { flex: 1; min-width: 0; }
    .ws-switch-name { font-size: 13px; font-weight: 600; color: var(--text-primary); line-height: 1.2; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; letter-spacing: -0.1px; }
    .ws-switch-sub { font-size: 11.5px; color: var(--text-muted); margin-top: 2px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .ws-switch-chev { color: var(--text-muted); flex-shrink: 0; }
    .ws-switch-chev svg { width: 14px; height: 14px; }
    .ws-switch-divider { height: 1px; background: var(--neutral-100); margin: 0 6px; }
    .ws-switch-score { display: flex; align-items: center; gap: 10px; padding: 8px 10px; border-radius: 8px; cursor: pointer; transition: background 0.12s; }
    .ws-switch-score:hover { background: var(--neutral-50); }
    .ws-switch-score .ring { width: 28px; height: 28px; border-radius: 50%; background: conic-gradient(var(--primary-500) 0% 78%, var(--neutral-100) 78% 100%); display: flex; align-items: center; justify-content: center; flex-shrink: 0; position: relative; }
    .ws-switch-score .ring::after { content: ''; position: absolute; inset: 3px; background: var(--neutral-0); border-radius: 50%; }
    .ws-switch-score .ring-num { font-size: 11px; font-weight: 700; color: var(--text-primary); position: relative; z-index: 1; }
    .ws-switch-score .lbl { font-size: 13px; font-weight: 500; color: var(--text-secondary); letter-spacing: -0.1px; }
    .create-btn { display: flex; align-items: center; justify-content: center; gap: 8px; width: 100%; padding: 11px 16px; background: var(--text-primary); color: #fff; border: none; border-radius: var(--radius-full); font-family: inherit; font-size: 14px; font-weight: 600; cursor: pointer; transition: all 0.15s; margin-bottom: 14px; box-shadow: 0 1px 2px rgba(0,0,0,0.06); letter-spacing: -0.1px; }
    .create-btn:hover { background: #1a1a1a; transform: translateY(-1px); box-shadow: 0 4px 12px -4px rgba(0,0,0,0.3); }
    .create-btn svg { width: 14px; height: 14px; }
    /* Sidebar bottom (profile + utility icons) */
    .sidebar-bottom { margin-top: auto; padding-top: 12px; display: flex; flex-direction: column; gap: 6px; }
    .sidebar-utils { display: flex; align-items: center; gap: 4px; padding: 0 4px; }
    .sb-icon-btn { width: 34px; height: 34px; border-radius: 8px; background: transparent; border: none; cursor: pointer; display: inline-flex; align-items: center; justify-content: center; color: var(--text-muted); transition: all 0.12s; position: relative; }
    .sb-icon-btn:hover { background: var(--neutral-50); color: var(--text-primary); }
    .sb-icon-btn svg { width: 17px; height: 17px; }
    .sb-icon-btn .dot { position: absolute; top: 8px; right: 8px; width: 7px; height: 7px; background: var(--danger-500); border: 1.5px solid var(--neutral-0); border-radius: 50%; }
    .sb-profile { display: flex; align-items: center; gap: 10px; padding: 8px 10px; border-radius: 8px; cursor: pointer; background: transparent; border: none; width: 100%; transition: background 0.12s; font-family: inherit; }
    .sb-profile:hover { background: var(--neutral-50); }
    .sb-profile .av { width: 28px; height: 28px; border-radius: 50%; background: #0026FF; color: #fff; display: flex; align-items: center; justify-content: center; font-size: 12px; font-weight: 600; flex-shrink: 0; }
    .sb-profile .info { flex: 1; min-width: 0; text-align: left; }
    .sb-profile .name { font-size: 13px; font-weight: 600; color: var(--text-primary); line-height: 1.2; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; letter-spacing: -0.1px; }
    .sb-profile .chev { color: var(--text-muted); flex-shrink: 0; }
    .sb-profile .chev svg { width: 14px; height: 14px; }
    /* Search talent with AI — same as a regular nav item, only the icon is special */
    .nav-item.ai-highlight .ai-pill { padding: 1px 7px; background: var(--ai-grad); color: #fff; border-radius: var(--radius-full); font-family: 'Geist Mono', monospace; font-weight: 500; font-size: 9.5px; font-weight: 700; letter-spacing: 0.4px; text-transform: uppercase; }

    .sidebar-bottom { margin-top: auto; display: flex; flex-direction: column; gap: 8px; }
    .upgrade-card { padding: 12px; background: linear-gradient(135deg, #F5F1FF, #EFF6FF); border: 1px solid #D6CFFF; border-radius: var(--radius-md); cursor: pointer; transition: all 0.15s; }
    .upgrade-card:hover { transform: translateY(-1px); box-shadow: 0 6px 18px -8px rgba(124, 92, 255, 0.3); }
    .uc-head { display: flex; align-items: center; gap: 8px; margin-bottom: 6px; }
    .uc-badge { padding: 1px 7px; background: var(--ai-grad); color: #fff; border-radius: 4px; font-size: 10px; font-weight: 600; letter-spacing: 0.4px; text-transform: uppercase; }
    .uc-cap { font-size: 11px; font-weight: 600; color: var(--text-muted); }
    .uc-title { font-size: 13px; font-weight: 700; line-height: 1.35; margin-bottom: 8px; }
    .uc-cta { display: inline-flex; align-items: center; gap: 4px; font-size: 11.5px; font-weight: 600; color: var(--primary-600); }
    .uc-cta svg { width: 11px; height: 11px; }
    .user-card { display: flex; align-items: center; gap: 10px; padding: 8px; border-radius: var(--radius-sm); cursor: pointer; transition: background 0.15s; }
    .user-card:hover { background: var(--neutral-50); }
    .user-card .av { width: 28px; height: 28px; border-radius: 50%; background: #0026FF; color: #fff; display: flex; align-items: center; justify-content: center; font-size: 12px; font-weight: 700; }
    .user-card .body { flex: 1; min-width: 0; }
    .user-card .name { font-size: 12.5px; font-weight: 700; line-height: 1.2; }
    .user-card .email { font-size: 11px; color: var(--text-muted); }
    .user-card .more svg { width: 14px; height: 14px; color: var(--text-muted); }

    /* Header */
    .header { grid-area: header; background: var(--neutral-0); border-bottom: 1px solid var(--border); padding: 0 24px; display: flex; align-items: center; justify-content: space-between; gap: 14px; position: sticky; top: 0; z-index: 40; }
    .breadcrumb { display: flex; align-items: center; gap: 8px; font-size: 14px; color: var(--text-muted); }
    .breadcrumb .current { color: var(--text-primary); font-weight: 600; }
    .breadcrumb .sep { color: var(--neutral-300); }
    .header-actions { display: flex; align-items: center; gap: 8px; }
    .icon-btn { width: 34px; height: 34px; border-radius: var(--radius-sm); background: transparent; border: none; cursor: pointer; display: flex; align-items: center; justify-content: center; color: var(--text-secondary); transition: all 0.15s; position: relative; }
    .icon-btn:hover { background: var(--neutral-50); color: var(--text-primary); }
    .icon-btn svg { width: 16px; height: 16px; }
    .icon-btn .dot { position: absolute; top: 7px; right: 8px; width: 7px; height: 7px; background: var(--danger-500); border: 1.5px solid var(--neutral-0); border-radius: 50%; }
    .profile-chip { display: inline-flex; align-items: center; gap: 10px; padding: 4px 8px 4px 4px; background: transparent; border: none; border-radius: var(--radius-full); cursor: pointer; transition: background 0.15s; font-family: inherit; }
    .profile-chip:hover { background: var(--neutral-50); }
    .profile-chip .av { width: 24px; height: 24px; border-radius: 50%; background: #0026FF; color: #fff; display: flex; align-items: center; justify-content: center; font-size: 11px; font-weight: 700; flex-shrink: 0; }
    .profile-chip .info { display: flex; flex-direction: column; line-height: 1.2; text-align: left; }
    .profile-chip .name { font-size: 13px; font-weight: 700; color: var(--text-primary); white-space: nowrap; }
    .profile-chip .email { font-size: 11px; color: var(--text-muted); white-space: nowrap; }
    .profile-chip .chev { color: var(--text-muted); margin-left: 2px; }
    .profile-chip .chev svg { width: 14px; height: 14px; }
    @media (max-width: 720px) { .profile-chip .info { display: none; } }

    main { grid-area: main; padding: 28px 32px 80px; overflow-x: hidden; background: #fff; }
    .wrapper { max-width: 720px; margin: 0 auto; }

    .page-head { display: flex; justify-content: space-between; align-items: center; margin-bottom: 22px; }
    .page-head h1 { font-size: 26px; font-weight: 700; letter-spacing: -0.3px; }
    .mark-all { font-size: 13px; font-weight: 600; color: var(--text-muted); cursor: pointer; background: none; border: none; padding: 6px 12px; border-radius: var(--radius-sm); transition: all 0.15s; }
    .mark-all:hover { color: var(--text-primary); background: var(--neutral-100); }

    /* Filter tabs */
    .filter-tabs { display: flex; gap: 4px; margin-bottom: 18px; border-bottom: 1px solid var(--border); }
    .filter-tab { padding: 9px 14px; background: none; border: none; cursor: pointer; font-family: inherit; font-size: 13.5px; font-weight: 600; color: var(--text-muted); border-bottom: 2px solid transparent; margin-bottom: -1px; transition: all 0.15s; }
    .filter-tab:hover { color: var(--text-primary); }
    .filter-tab.active { color: var(--primary-600); border-bottom-color: var(--primary-500); }
    .filter-tab .ct { padding: 1px 7px; background: var(--neutral-100); color: var(--text-muted); border-radius: var(--radius-full); font-size: 10.5px; margin-left: 4px; font-family: 'Geist Mono', monospace; font-weight: 500; }
    .filter-tab.active .ct { background: var(--primary-500); color: #fff; }

    /* Notification items */
    .notif-list { display: flex; flex-direction: column; gap: 6px; }
    .notif {
      display: flex; gap: 14px; align-items: flex-start;
      padding: 14px 16px;
      background: var(--neutral-0);
      border: 1.5px solid var(--border-strong);
      border-radius: var(--radius-md);
      cursor: pointer;
      transition: all 0.15s;
      position: relative;
    }
    .notif:hover { border-color: var(--primary-500); transform: translateY(-1px); box-shadow: 0 6px 18px -8px rgba(0, 38, 255, 0.12); }
    .notif.unread { background: var(--neutral-0); }
    .notif.unread::before { content: ''; position: absolute; left: -6px; top: 50%; transform: translateY(-50%); width: 8px; height: 8px; border-radius: 50%; background: var(--primary-500); }
    .notif.read { opacity: 0.7; }
    .notif-ico {
      width: 38px; height: 38px;
      border-radius: 10px;
      display: flex; align-items: center; justify-content: center;
      flex-shrink: 0;
    }
    .notif-ico svg { width: 18px; height: 18px; }
    .notif-ico.ai { background: linear-gradient(135deg, #F5F1FF, #EFF6FF); color: #5B4ACF; }
    .notif-ico.interview { background: var(--primary-50); color: var(--primary-500); }
    .notif-ico.offer { background: var(--success-50); color: var(--success-500); }
    .notif-ico.candidate { background: #FFE9DF; color: #C04A1E; }
    .notif-ico.system { background: var(--neutral-100); color: var(--text-secondary); }
    .notif-ico.warning { background: var(--warning-50); color: var(--warning-500); }
    .notif-body { flex: 1; min-width: 0; }
    .notif-title { font-size: 14px; font-weight: 700; margin-bottom: 2px; line-height: 1.4; }
    .notif-sub { font-size: 13px; color: var(--text-muted); line-height: 1.5; }
    .notif-sub strong { color: var(--text-secondary); font-weight: 600; }
    .notif-time { font-size: 12px; color: var(--text-muted); font-weight: 600; white-space: nowrap; flex-shrink: 0; padding-top: 2px; }
    .notif-ai-tag { display: inline-flex; align-items: center; gap: 3px; padding: 1px 6px; background: linear-gradient(135deg, #7C5CFF20, #2684FF20); color: #5B4ACF; border-radius: 4px; font-size: 9.5px; font-weight: 700; margin-left: 6px; text-transform: uppercase; letter-spacing: 0.4px; }
    .notif-ai-tag svg { width: 9px; height: 9px; }

    .empty {
      padding: 60px 20px;
      text-align: center;
      background: var(--neutral-0);
      border: 1.5px dashed var(--border-strong);
      border-radius: var(--radius-md);
      color: var(--text-muted);
      font-size: 14px;
    }

    @media (max-width: 880px) {
      .app { grid-template-columns: 1fr; grid-template-areas: "header" "main"; }
      .sidebar { display: none; }
      main { padding: 20px 18px 56px; }
    }
  </style>
</head>
<body>
<div class="app">
  <aside class="sidebar">
    <a href="recruit-pipeline.html" class="brand-logo"><img src="wisemonk_logo_final.png" alt="Wisemonk"></a>
    <!-- Create button -->
    <button class="create-btn" type="button" onclick="location.href='recruit-role.html'">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
      Create role
    </button>

    <div class="nav-section">
      <a class="nav-item" href="recruit-pipeline.html"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><rect x="2" y="7" width="20" height="14" rx="2"/><path d="M16 21V5a2 2 0 0 0-2-2h-4a2 2 0 0 0-2 2v16"/></svg><span class="label">Open roles</span><span class="badge">1</span></a>
      <a class="nav-item" href="recruit-candidates.html"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2"/></svg><span class="label">Shortlisted</span><span class="badge">5</span></a>
      <a class="nav-item" href="recruit-interviews.html"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="4" width="18" height="18" rx="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg><span class="label">Interviews</span><span class="badge">1</span></a>
      <a class="nav-item active" href="recruit-inbox.html"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9"/><path d="M13.73 21a2 2 0 0 1-3.46 0"/></svg><span class="label">Notifications</span><span class="badge">3</span></a>
      <a class="nav-item ai-highlight" href="recruit-search.html"><svg viewBox="0 0 24 24" fill="url(#aiNavGrad6)" stroke="none"><defs><linearGradient id="aiNavGrad6" x1="0" y1="0" x2="24" y2="24" gradientUnits="userSpaceOnUse"><stop offset="0%" stop-color="#7C5CFF"/><stop offset="100%" stop-color="#2684FF"/></linearGradient></defs><path d="M12 2L13.8 9.5 L21 11 L13.8 12.5 L12 22 L10.2 12.5 L3 11 L10.2 9.5 Z"/></svg><span class="label">Search talent with AI</span></a>
    </div>
    <!-- Sidebar bottom: profile -->
    <div class="sidebar-bottom">
      <button class="sb-profile" onclick="location.href='recruit-settings.html'" title="Profile">
        <div class="av">A</div>
        <div class="info"><div class="name">Alex Mehta</div></div>
        <span class="chev"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="6 9 12 15 18 9"/></svg></span>
      </button>
    </div>
  </aside>

  <main>
    <div class="wrapper">
      <div class="page-head">
        <h1>Inbox</h1>
        <button class="mark-all" id="markAll">Mark all as read</button>
      </div>

      <div class="filter-tabs">
        <button class="filter-tab active" data-filter="all">All <span class="ct">8</span></button>
        <button class="filter-tab" data-filter="unread">Unread <span class="ct">3</span></button>
        <button class="filter-tab" data-filter="mentions">Mentions <span class="ct">1</span></button>
      </div>

      <div class="notif-list" id="notifList"></div>
    </div>
  </main>
</div>

<script>
  const notifs = [
    { id: 1, type: 'interview', unread: true, title: 'Interview with Priya Sharma in 1 hour', sub: 'Senior Backend Engineer · 11:00 IST · Built-in video room', time: '52m', href: 'recruit-interview.html?name=Priya%20Sharma' },
    { id: 2, type: 'ai', unread: true, title: 'AI flagged a strong fit', sub: '<strong>Meera Iyer (85% fit)</strong> just finished her async video. Watch and decide.', time: '2h', href: 'recruit-pipeline.html', ai: true },
    { id: 3, type: 'offer', unread: true, title: 'Offer signed by Arjun Patel', sub: 'Senior Backend Engineer · onboarding handed off to Wisemonk EOR', time: '5h', href: '#' },
    { id: 4, type: 'candidate', unread: false, title: '5 new candidates surfaced for Senior Backend Engineer', sub: 'AI screened 47 applicants, selected top 5', time: '1d', href: 'recruit-pipeline.html', ai: true, mentioned: false },
    { id: 5, type: 'warning', unread: false, title: 'You\'ve hit the 5-candidate cap', sub: '12 more candidates waiting. Upgrade to see them all.', time: '1d', href: 'recruit-upgrade.html?reason=more-candidates' },
    { id: 6, type: 'interview', unread: false, title: 'Interview reschedule requested', sub: '<strong>@alex</strong> Rohan Kapoor asked to move to Friday 3 PM', time: '2d', href: '#', mentioned: true },
    { id: 7, type: 'system', unread: false, title: 'Welcome to Wisemonk Recruitment', sub: 'Your hiring portal is live. Open your first role to start.', time: '4d', href: '#' },
    { id: 8, type: 'candidate', unread: false, title: '3 candidates auto-rejected', sub: 'AI screening filtered out below-threshold applicants automatically', time: '4d', href: '#', ai: true }
  ];

  const ICONS = {
    interview: '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polygon points="23 7 16 12 23 17 23 7"/><rect x="1" y="5" width="15" height="14" rx="2"/></svg>',
    ai: '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M9.937 15.5A2 2 0 0 0 8.5 14.063l-6.135-1.582a.5.5 0 0 1 0-.962L8.5 9.936A2 2 0 0 0 9.937 8.5l1.582-6.135a.5.5 0 0 1 .963 0L14.063 8.5A2 2 0 0 0 15.5 9.937l6.135 1.581a.5.5 0 0 1 0 .964L15.5 14.063a2 2 0 0 0-1.437 1.437l-1.582 6.135a.5.5 0 0 1-.963 0z"/></svg>',
    offer: '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"/></svg>',
    candidate: '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><line x1="19" y1="8" x2="19" y2="14"/><line x1="22" y1="11" x2="16" y2="11"/></svg>',
    warning: '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="11" width="18" height="11" rx="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg>',
    system: '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg>'
  };

  let currentFilter = 'all';
  function render() {
    const list = notifs.filter(n => currentFilter === 'all' ? true : currentFilter === 'unread' ? n.unread : n.mentioned);
    const el = document.getElementById('notifList');
    if (list.length === 0) { el.innerHTML = '<div class="empty">Nothing here yet.</div>'; return; }
    el.innerHTML = list.map(n => `
      <div class="notif ${n.unread ? 'unread' : 'read'}" data-href="${n.href}">
        <div class="notif-ico ${n.type}">${ICONS[n.type] || ICONS.system}</div>
        <div class="notif-body">
          <div class="notif-title">${n.title}${n.ai ? '<span class="notif-ai-tag"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M9.937 15.5A2 2 0 0 0 8.5 14.063l-6.135-1.582a.5.5 0 0 1 0-.962L8.5 9.936A2 2 0 0 0 9.937 8.5l1.582-6.135a.5.5 0 0 1 .963 0L14.063 8.5A2 2 0 0 0 15.5 9.937l6.135 1.581a.5.5 0 0 1 0 .964L15.5 14.063a2 2 0 0 0-1.437 1.437l-1.582 6.135a.5.5 0 0 1-.963 0z"/></svg>AI</span>' : ''}</div>
          <div class="notif-sub">${n.sub}</div>
        </div>
        <div class="notif-time">${n.time}</div>
      </div>
    `).join('');
    document.querySelectorAll('.notif').forEach(n => {
      n.addEventListener('click', () => { const href = n.dataset.href; if (href && href !== '#') location.href = href; });
    });
  }
  render();

  document.querySelectorAll('.filter-tab').forEach(t => {
    t.addEventListener('click', () => {
      document.querySelectorAll('.filter-tab').forEach(b => b.classList.remove('active'));
      t.classList.add('active');
      currentFilter = t.dataset.filter;
      render();
    });
  });

  document.getElementById('markAll').addEventListener('click', () => {
    notifs.forEach(n => n.unread = false);
    render();
  });

  document.querySelectorAll('.nav-item').forEach(n => {
    n.addEventListener('click', e => { if (n.getAttribute('href') === '#') { e.preventDefault(); alert('Coming soon'); } });
  });
</script>
</body>
</html>
